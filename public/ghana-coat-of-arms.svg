<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Shield -->
  <path d="M100 10 L180 50 L180 130 Q180 180 100 210 Q20 180 20 130 L20 50 Z" fill="#29235c" stroke="#d4a843" stroke-width="3"/>
  
  <!-- Quartered shield -->
  <line x1="100" y1="10" x2="100" y2="210" stroke="#d4a843" stroke-width="2"/>
  <line x1="20" y1="100" x2="180" y2="100" stroke="#d4a843" stroke-width="2"/>
  
  <!-- Center band with black star -->
  <rect x="70" y="75" width="60" height="50" fill="#d4a843"/>
  <polygon points="100,78 106,94 123,94 110,104 115,120 100,112 85,120 90,104 77,94 94,94" fill="#000"/>
  
  <!-- Top left - sword -->
  <rect x="50" y="40" rx="2" width="6" height="35" fill="#d4a843" transform="rotate(-20, 53, 57)"/>
  
  <!-- Top right - castle -->
  <rect x="120" y="35" width="30" height="25" fill="#d4a843" rx="2"/>
  <rect x="122" y="30" width="8" height="10" fill="#d4a843"/>
  <rect x="140" y="30" width="8" height="10" fill="#d4a843"/>
  
  <!-- Bottom left - cocoa -->
  <circle cx="55" cy="140" r="8" fill="#00983a"/>
  <circle cx="70" cy="145" r="6" fill="#00983a"/>
  
  <!-- Bottom right - mining -->
  <rect x="125" y="130" width="25" height="6" fill="#d4a843" transform="rotate(-30, 137, 133)"/>
  <rect x="130" y="140" width="25" height="6" fill="#d4a843" transform="rotate(15, 142, 143)"/>
  
  <!-- Eagles/supporters simplified -->
  <ellipse cx="12" cy="100" rx="12" ry="30" fill="#d4a843" opacity="0.8"/>
  <ellipse cx="188" cy="100" rx="12" ry="30" fill="#d4a843" opacity="0.8"/>
  
  <!-- Banner -->
  <path d="M40 200 Q100 190 160 200 L155 215 Q100 205 45 215 Z" fill="#d4a843"/>
  <text x="100" y="212" text-anchor="middle" font-size="8" font-weight="bold" fill="#29235c" font-family="serif">FREEDOM AND JUSTICE</text>
</svg>
